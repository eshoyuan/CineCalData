name: Materialize offline catalog images

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cinecal-catalog-images
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: macos-15
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install image pipeline
        run: python -m pip install 'Pillow>=11,<13'

      - name: Test crop scoring
        run: python -m unittest discover -s scripts -p 'test_materialize_catalog_images.py'

      - name: Download and crop every catalog backdrop
        run: python scripts/materialize_catalog_images.py --workers 12

      - name: Verify complete local asset pairs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          catalog = json.loads(Path("data/catalog.json").read_text())
          expected = catalog["imageStats"]["processed"] * 2
          actual = len(list(Path("data/catalog-images").rglob("*.jpg")))
          assert catalog["imageStats"]["failed"] == 0, catalog["imageStats"]
          assert actual == expected, {"expected": expected, "actual": actual}
          print({"catalogItems": len(catalog["items"]), "imageFiles": actual})
          PY

      - name: Commit widget-ready images
        run: |
          git config user.name "CineCal Image Builder"
          git config user.email "actions@users.noreply.github.com"
          git add data/catalog.json data/catalog-images
          git commit -m "Materialize widget-ready catalog images"
          git pull --rebase origin main
          git push
