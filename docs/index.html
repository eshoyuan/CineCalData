<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0c10">
  <meta name="description" content="CineCal 电影日历小组件在线预览器">
  <title>CineCal · Widget Preview</title>
  <link rel="stylesheet" href="styles.css?v=4">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="./" aria-label="CineCal 首页">
      <span class="brand-mark" aria-hidden="true">13</span>
      <span><strong>CineCal</strong><small>Widget Preview</small></span>
    </a>
    <a class="repo-link" href="https://github.com/eshoyuan/CineCalData" target="_blank" rel="noreferrer">Public data ↗</a>
  </header>

  <main class="preview-page">
    <section class="preview-heading">
      <div>
        <p class="eyebrow">每天一帧电影</p>
        <h1>电影日历小组件</h1>
      </div>
      <p>选择日期并切换候选，直接检查本地裁切后的小号与中号成品图。</p>
    </section>

    <section class="controls" aria-label="日期控制器">
      <div class="date-controls">
        <button id="previousDate" class="icon-button" type="button" aria-label="上一个有数据的日期">‹</button>
        <label class="date-field">
          <span>预览日期</span>
          <input id="datePicker" type="date">
        </label>
        <button id="nextDate" class="icon-button" type="button" aria-label="下一个有数据的日期">›</button>
      </div>
      <button id="shuffleCandidate" class="shuffle-button" type="button"><span aria-hidden="true">↝</span> 换一部</button>
      <button id="shuffleDate" class="shuffle-button secondary" type="button">随机一天</button>
    </section>

    <section class="size-comparison">
      <div class="section-heading">
        <p id="selectedDateLabel" class="eyebrow">正在读取公开目录</p>
        <h2>两种尺寸，同一份内容。</h2>
        <span id="candidateLabel" class="candidate-label"></span>
      </div>
      <div class="comparison-stage">
        <figure><div id="smallWidget"></div><figcaption><strong>小号</strong><span>1:1 · 169 × 169 pt</span></figcaption></figure>
        <figure><div id="mediumWidget"></div><figcaption><strong>中号</strong><span>2.13:1 · 360 × 169 pt</span></figcaption></figure>
      </div>
    </section>
  </main>

  <footer><span>CineCal Preview</span><span>数据与图片归各自权利人所有 · Prototype</span></footer>

  <template id="widgetTemplate">
    <a class="movie-widget" target="_blank" rel="noreferrer">
      <img class="widget-image" alt="">
      <span class="image-fallback" aria-hidden="true">▱</span>
      <span class="widget-gradient" aria-hidden="true"></span>
      <span class="small-copy">
        <span class="small-day"></span>
        <span class="small-spacer"></span>
        <span class="small-title-row"><strong class="movie-title"></strong><b class="rating-badge"></b></span>
        <span class="movie-quote"></span>
      </span>
      <span class="medium-copy">
        <span class="date-lockup"><strong class="medium-day"></strong><small class="medium-subtitle"></small></span>
        <span class="wide-text"><span class="wide-title-row"><strong class="book-title"></strong><b class="rating-badge"></b></span><span class="movie-quote"></span></span>
      </span>
    </a>
  </template>

  <script src="app.js?v=4" defer></script>
</body>
</html>
