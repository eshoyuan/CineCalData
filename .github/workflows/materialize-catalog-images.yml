name: Materialize offline catalog images

on:
  schedule:
    # Small daily increment after the editorial enrichment job.
    - cron: "5 19 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum missing image pairs (0 means all)"
        required: false
        default: "0"
        type: string

permissions:
  contents: write

concurrency:
  group: cinecal-catalog-writer
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: macos-15
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install image pipeline
        run: python -m pip install 'Pillow>=11,<13'

      - name: Test crop scoring
        run: python -m unittest discover -s scripts -p 'test_materialize_catalog_images.py'

      - name: Download and crop missing catalog backdrops
        env:
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_LIMIT: ${{ inputs.limit || '0' }}
        run: |
          if [ "$EVENT_NAME" = "schedule" ]; then
            LIMIT=12
          else
            LIMIT="$REQUESTED_LIMIT"
          fi
          python scripts/materialize_catalog_images.py --missing-only --limit "$LIMIT" --workers 12

      - name: Rebuild the compact client catalog
        run: |
          python -m unittest discover -s scripts -p 'test_build_widget_catalog.py'
          python scripts/build_widget_catalog.py

      - name: Verify complete local asset pairs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          catalog = json.loads(Path("data/catalog.json").read_text())
          actual = len(list(Path("data/catalog-images").rglob("*.jpg")))
          expected_minimum = catalog["imageStats"]["materializedTotal"] * 2
          assert actual >= expected_minimum, {"expectedMinimum": expected_minimum, "actual": actual}
          print({"catalogItems": len(catalog["items"]), "imageFiles": actual})
          PY

      - name: Commit widget-ready images
        run: |
          git config user.name "CineCal Image Builder"
          git config user.email "actions@users.noreply.github.com"
          git add data/catalog.json data/widget-catalog.json data/catalog-images
          if git diff --cached --quiet; then
            echo "No missing image pairs were found"
            exit 0
          fi
          git commit -m "Materialize widget-ready catalog images"
          git pull --rebase origin main
          git push
